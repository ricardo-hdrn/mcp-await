name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            use-cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            use-cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use-cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use-cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use-cross: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Build
        run: ${{ matrix.use-cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../mcp-await-${{ matrix.target }}.tar.gz mcp-await
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../mcp-await-${{ matrix.target }}.zip mcp-await.exe
          cd ../../..

      - name: Smoke test (unix)
        if: runner.os != 'Windows' && !matrix.use-cross
        run: ./target/${{ matrix.target }}/release/mcp-await --help

      - name: Smoke test (cross/qemu)
        if: matrix.use-cross
        run: cross run --release --target ${{ matrix.target }} -- --help

      - name: Smoke test (windows)
        if: runner.os == 'Windows'
        run: ./target/${{ matrix.target }}/release/mcp-await.exe --help

      - uses: actions/upload-artifact@v4
        with:
          name: mcp-await-${{ matrix.target }}
          path: mcp-await-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List assets
        run: ls -la mcp-await-*

      - uses: softprops/action-gh-release@v2
        with:
          files: mcp-await-*
          generate_release_notes: true
